name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger workflow only when you push a tag starting with 'v'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest] # Add 'macos-latest' or 'ubuntu-latest' if you want Mac/Linux builds too

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Required to publish to GitHub Releases
        run: npm run build
